<div class="@cmpInternalId" style="z-index: 1;">
	<div class="pipeline-node-type-minimaze" onclick="controller('WorkSpaceController').handleNodeMinimize(this)">_</div>
	<div class="title-box pipeline-node-type-title-box">
		<div>
			<img src="app/assets/imgs/duckdb-icon.svg" width="20">
			@label
		</div>
		<div class="statusicon">@nodeCount</div>
	</div>
	<div class="box @formWrapClass">
		<form (formRef)="formRef" onsubmit="return false;">
			<p>Target Datawahoreuse:</p>
			<select placeholder="Create a new one" (forEach)="targetDataWarehouses" onchange="component.selectTargetDW(this.value)">
				<option each="item" value="{item.dwname}.{item.table}">{item.dwname}</option>
			</select>
			<span (showIf)="!self.userExistingDW">
				<p>Database:</p>
				<input type="text" class="newDatabaseName" (value)="database" placeholder="Enter the DB name">
				<p class="duckdb-table">Table name:</p>
				<input type="text" class="duckdb-table" (value)="tableName" placeholder="Enter table name">
			</span>
		</form>
	</div>
</div>
<style>
	.parent-node .DuckDBOutput { z-index: 1; }
</style>
